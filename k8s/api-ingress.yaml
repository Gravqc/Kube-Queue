apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubequeue-api-ingress
  namespace: kubequeue
spec:
  rules:
    - host: kubequeue.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kubequeue-api
                port:
                  number: 80