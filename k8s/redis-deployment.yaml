apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kubequeue
spec:
  replicas: 1  # Single Redis instance for simplicity
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine  # Lightweight Redis image
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
