apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kubequeue-worker-hpa
  namespace: kubequeue
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kubequeue-worker
  minReplicas: 1  # Minimum number of worker pods
  maxReplicas: 10  # Maximum number of worker pods
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50  # Scale when CPU exceeds 50%
