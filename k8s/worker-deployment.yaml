apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubequeue-worker
  namespace: kubequeue
spec:
  replicas: 1  # Start with 1 worker, HPA will scale as needed
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: kubequeue_worker:local
          imagePullPolicy: IfNotPresent
          env:
            # Load Redis configuration from ConfigMap
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: kubequeue-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: kubequeue-config
                  key: REDIS_PORT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
